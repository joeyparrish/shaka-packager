name: Update Docs

# Runs when a new release is created on GitHub, or when a pull request is
# opened.
#
# Pushes updated docs to gh-pages.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  release:
    types: [published]
  # For manual debugging:
  workflow_dispatch:
    inputs:
      ref:
        description: "The ref to build docs from."
        required: True

jobs:
  publish_docs:
    name: Publish updated docs
    runs-on: ubuntu-latest
    steps:
      - name: Compute ref
        id: ref
        # We could be building from a workflow dispatch (manual run), release
        # event, or pull request.  Subsequent steps can refer to
        # steps.ref.outputs.ref to determine the correct ref in all cases.
        run: echo '::set-output ref=${{ github.event.inputs.ref || github.event.release.tag_name || github.ref }}'

      - name: Checkout code
        uses: actions/checkout@v2
        with:
          path: src
          ref: ${{ steps.ref.outputs.ref }}

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.8

      - name: Install dependencies
        run: |
          pip install wheel
          pip install sphinxcontrib.plantuml
          pip install recommonmark
          pip install cloud_sptheme
          pip install breathe
          sudo apt-get install -y doxygen

      - name: Generate docs
        run: |
          mkdir gh-pages
          cd src
          make -C docs/ html
          doxygen docs/Doxyfile
          mv out/sphinx/html ../gh-pages/html
          mv out/doxygen/html ../gh-pages/docs

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: gh-pages
          full_commit_message: Generate docs for ${{ steps.ref.outputs.ref }}
