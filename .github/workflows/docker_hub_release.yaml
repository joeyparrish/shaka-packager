name: Docker Hub Release

# Runs when a new release is created on GitHub.
# Creates a corresponding Docker Hub release and publishes it.

on:
  release:
    types: [published]

jobs:
  publish_docker_hub:
    name: Publish to Docker Hub
    runs-on: ubuntu-latest
    steps:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_CI_USERNAME }}
          password: ${{ secrets.DOCKERHUB_CI_TOKEN }}

      - name: Push to Docker Hub
        uses: docker/build-push-action@v2
        with:
          push: true
          # FIXME: revert to real name
          #tags: google/shaka-packager:latest,google/shaka-packager:${{ github.ref }}
          tags: edashpackager-ci-test/shaka-packager-ci-test:latest,edashpackager-ci-test/shaka-packager-ci-test:${{ github.ref }}
